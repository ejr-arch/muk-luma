<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create account - MUK Events">
  <title>Sign In | MUK Events</title>
  <link rel="icon" type="image/png" href="muk-logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="auth">
  <div class="page-loader">
    <div class="loader-spinner"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">
          <img src="muk-logo.png" alt="MUK" style="width:64px;height:64px;border-radius:16px;">
        </a>
        <h1 class="auth-title" id="auth-title">Welcome Back</h1>
        <p class="auth-subtitle" id="auth-subtitle">Sign in to continue to MUK Events</p>
      </div>

      <button class="btn btn-google" id="google-signin">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider">or</div>

      <form id="signin-form">
        <div class="input-group">
          <label class="input-label" for="signin-email">Email</label>
          <input type="email" class="input" id="signin-email" placeholder="you@students.mak.ac.ug" required>
        </div>
        <div class="input-group">
          <label class="input-label" for="signin-password">Password</label>
          <input type="password" class="input" id="signin-password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Sign In</button>
      </form>

      <form id="signup-form" class="hidden">
        <div class="input-group">
          <label class="input-label" for="signup-name">Full Name</label>
          <input type="text" class="input" id="signup-name" placeholder="John Kamya" required>
        </div>
        <div class="input-group">
          <label class="input-label" for="signup-email">Email</label>
          <input type="email" class="input" id="signup-email" placeholder="you@students.mak.ac.ug" required>
        </div>
        <div class="input-group">
          <label class="input-label" for="signup-password">Password</label>
          <input type="password" class="input" id="signup-password" placeholder="Create a password (min 6 characters)" minlength="6" required>
        </div>
        <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: var(--space-4);">
          Use your <strong>@students.mak.ac.ug</strong> or <strong>@mak.ac.ug</strong> email to sign up.
        </p>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Create Account</button>
      </form>

      <div class="auth-footer">
        <span id="switch-text">Don't have an account?</span>
        <a href="?mode=signup" id="switch-link">Sign up</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    function getRedirectUrl(role, isNewUser = false) {
      const redirectParam = new URLSearchParams(window.location.search).get('redirect');
      if (redirectParam) return redirectParam;
      
      switch(role) {
        case 'admin':
          return isNewUser ? '/admin.html' : '/admin.html';
        case 'organizer':
          return isNewUser ? '/create-event.html' : '/';
        case 'student':
        default:
          return '/';
      }
    }

    document.getElementById('google-signin').addEventListener('click', async () => {
      const { signInWithGoogle } = await import('./js/auth.js');
      const result = await signInWithGoogle();
      if (!result.error && result.data) {
        const { getCurrentUser } = await import('./js/auth.js');
        const user = await getCurrentUser();
        const role = user?.profile?.role || 'student';
        window.location.href = getRedirectUrl(role, false);
      }
    });

    const params = new URLSearchParams(window.location.search);
    const isSignUp = params.get('mode') === 'signup';

    const signInForm = document.getElementById('signin-form');
    const signUpForm = document.getElementById('signup-form');
    const authTitle = document.getElementById('auth-title');
    const authSubtitle = document.getElementById('auth-subtitle');
    const switchText = document.getElementById('switch-text');
    const switchLink = document.getElementById('switch-link');

    if (isSignUp) {
      signInForm.classList.add('hidden');
      signUpForm.classList.remove('hidden');
      authTitle.textContent = 'Create Account';
      authSubtitle.textContent = 'Join the Makerere University community';
      switchText.textContent = 'Already have an account?';
      switchLink.textContent = 'Sign in';
      switchLink.href = '?mode=signin';
    }

    signInForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;

      const { signIn } = await import('./js/auth.js');
      const result = await signIn(email, password);

      if (!result.error) {
        const { getCurrentUser } = await import('./js/auth.js');
        const user = await getCurrentUser();
        const role = user?.profile?.role || 'student';
        window.location.href = getRedirectUrl(role, false);
      }
    });

    signUpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;

      const { signUp } = await import('./js/auth.js');
      const result = await signUp(email, password, name);

      if (!result.error) {
        const { getCurrentUser } = await import('./js/auth.js');
        const user = await getCurrentUser();
        const role = user?.profile?.role || 'student';
        window.location.href = getRedirectUrl(role, true);
      }
    });
  </script>
</body>
</html>
